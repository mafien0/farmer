name: Spell Checking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  codespell:
    name: Check spelling with codespell
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install codespell
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # On PRs — just check and fail if there are mistakes
      - name: Check spelling (PR)
        if: github.event_name == 'pull_request'
        run: codespell

      # On push to main — fix and open a PR
      - name: Fix spelling (push)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: codespell -w

      - name: Create Pull Request
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: correct spelling mistakes"
          title: "fix: correct spelling mistakes"
          body: |
            Automated spelling fixes by codespell.
          branch: fix/codespell
          delete-branch: true
          labels: spelling

  misspell:
    name: Check spelling with misspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Misspell
        uses: reviewdog/action-misspell@v1
        with:
          github_token: ${{ secrets.github_token }}
          locale: "US"
